# CI skeleton — stack-agnostic. The bootstrap fills the lint/test/build steps
# for the project's actual stack (detected at setup time). Pinned setup actions
# for the common stacks are included as commented examples; delete what you do
# not use. Resolve fresh SHAs with the procedure in references/action-pins.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

