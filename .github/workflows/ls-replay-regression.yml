# The self-heal merge gate (ADR-0010). A proposed L&S protocol fix is correct iff
# its deterministic replay reproduces the captured rendered prices — the SAME pure
# codec the feed-engine runs at runtime. This check is required on any PR that
# touches the protocol module, the self-heal core, or the fixture corpus; for
# self-heal-authored PRs it also enforces the bounded break surface.
name: ls protocol replay regression

on:
  pull_request:
    paths:
      - "packages/ls-protocol/**"
      - "packages/selfheal-core/**"
      - "fixtures/ls-protocol/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
      - name: Install pnpm
        run: npm i -g pnpm@11.9.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Replay regression (frame -> price, same codec as runtime)
        run: |
          pnpm --filter @cancri/ls-protocol exec vitest run
          pnpm --filter @cancri/selfheal-core exec vitest run

  bounded-surface:
    if: startsWith(github.head_ref, 'selfheal/')
    runs-on: ubuntu-latest
    steps:
      - name: Enforce the bounded break surface
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const allowed = [
              /^packages\/ls-protocol\//,
              /^packages\/selfheal-core\//,
              /^fixtures\/ls-protocol\//,
            ];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const outside = files
              .map((f) => f.filename)
              .filter((f) => !allowed.some((re) => re.test(f)));
            if (outside.length > 0) {
              core.setFailed("self-heal PR touches files outside the bounded surface:\n" + outside.join("\n"));
            } else {
              core.info(`bounded surface OK: ${files.length} file(s)`);
            }
