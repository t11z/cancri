# Deploy via Workload Identity Federation — keyless, no FIREBASE_TOKEN. A dedicated
# deployer service account is impersonated; firebase-tools deploys the Firebase
# surfaces and gcloud deploys the Cloud Run service + Job (which keeps the
# long-running deploys off the firebase-tools ADC path and its v15 #10726 timeout).
#
# Gated by the repo variable CANCRI_DEPLOY_ENABLED until WIF + the deployer SA are
# provisioned (see SETUP.md / the deploy-auth notes). Required repo variables:
#   GCP_PROJECT_ID, WIF_PROVIDER, DEPLOYER_SA
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED for the WIF OIDC token

jobs:
  deploy:
    if: ${{ vars.CANCRI_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GOOGLE_CLOUD_QUOTA_PROJECT: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
      - name: Install pnpm
        run: npm i -g pnpm@11.9.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web + functions
        # The Firebase web config is baked into the client bundle at build time by
        # Vite (VITE_* vars). It is public (protected by security rules), so these
        # are repo Variables, not secrets. Without them the build falls back to the
        # demo-cancri config in apps/web/src/firebase.ts.
        env:
          VITE_USE_EMULATOR: "false"
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
        run: |
          pnpm --filter @cancri/web build
          pnpm --filter @cancri/functions run build

      - name: Authenticate to GCP (WIF — no stored key)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true
          # Also mint an impersonated OAuth access token for the deployer SA. We use
          # it to `docker login` to Artifact Registry directly (below) instead of
          # gcloud's docker credential helper: the helper refreshes the token via
          # iamcredentials with the quota project attached, and that billing check is
          # evaluated against the *federated WIF principal* (not the deployer SA),
          # which lacks serviceusage.serviceUsageConsumer — so it 403s and the push
          # falls back to an unauthenticated request. A direct token login sidesteps
          # the helper entirely (the token is already the deployer SA's).
          token_format: "access_token"
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Deploy Firebase (hosting + functions + rules)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: >
          npx firebase-tools@15.22.3 deploy
          --only hosting,functions,firestore:rules,database
          --project "$PROJECT_ID" --non-interactive --force

      # gcloud reads the same ADC as firebase, so the long-running container
      # deploys stay off the firebase-tools auth path (and its v15 #10726 timeout).
      - name: Build & deploy feed-engine (Cloud Run)
        run: |
          REGION="${{ vars.GCP_REGION || 'europe-west1' }}"
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/cancri/feed-engine:${{ github.sha }}"
          # Log in with the impersonated deployer-SA access token (oauth2accesstoken),
          # not gcloud's credential helper — see the auth step for why. The token value
          # is registered as a masked secret by the auth action, so it is not logged.
          echo "${{ steps.auth.outputs.access_token }}" \
            | docker login -u oauth2accesstoken --password-stdin "https://$REGION-docker.pkg.dev"
          docker build -f services/feed-engine/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          gcloud run deploy cancri-feed-engine \
            --image "$IMAGE" --region "$REGION" --project "$PROJECT_ID" \
            --ingress internal --no-allow-unauthenticated \
            --min-instances 1 --max-instances 1 --concurrency 1 --cpu-boost

      - name: Self-heal Job (TODO — needs the Playwright capture image)
        run: |
          echo "self-heal Cloud Run Job: add a Playwright-based Dockerfile for services/selfheal,"
          echo "then: gcloud run jobs deploy cancri-selfheal --image ... --region $GCP_REGION"
