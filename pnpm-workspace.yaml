packages:
  - "apps/*"
  - "services/*"
  - "functions"
  - "packages/*"
  - "tools/*"

# pnpm 11 reads dependency build-script approvals here (a map, not a list).
# Dependencies allowed to run install/postinstall scripts.
allowBuilds:
  "@firebase/util": true
  "@google/genai": true
  esbuild: true
  protobufjs: true
